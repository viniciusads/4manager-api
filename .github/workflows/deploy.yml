name: Trigger auto deployment for api-4manage

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  AZURE_CONTAINER_APP_NAME: "api-4manage"
  AZURE_RESOURCE_GROUP: "rg-4manage"
  ACR_URL: "acrteste4managerapi-a6bqbxfghye5gbcr.azurecr.io"
  IMAGE_NAME: "acrteste4managerapi-a6bqbxfghye5gbcr.azurecr.io/api-4manage"

jobs:
  test:
    name: Run Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Rodar Testes de Unidade
        run: dotnet test tests/4Manager.Application.Tests/ --configuration Release

  build-and-deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_URL }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./src/4Manager.API/Dockerfile
          push: true
          tags: ${{ env.IMAGE_NAME }}:${{ github.ref_name }}

      - name: Deploy to Container App  # ← Usando CLI diretamente, sem o action problemático
        run: |
          az containerapp update \
            --name ${{ env.AZURE_CONTAINER_APP_NAME }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --image ${{ env.IMAGE_NAME }}:${{ github.ref_name }} \
            --registry-server ${{ env.ACR_URL }} \
            --registry-username ${{ secrets.ACR_USERNAME }} \
            --registry-password ${{ secrets.ACR_PASSWORD }}
