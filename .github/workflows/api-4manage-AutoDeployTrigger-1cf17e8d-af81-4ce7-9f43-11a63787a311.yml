name: Trigger auto deployment for api-4manage

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ main ]
    paths:
    - '**'
    - '.github/workflows/api-4manage-AutoDeployTrigger-1cf17e8d-af81-4ce7-9f43-11a63787a311.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.API4MANAGE_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.API4MANAGE_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.API4MANAGE_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}
          dockerfilePath: ./src/4Manager.API/Dockerfile
          registryUrl: acrteste4managerapi-a6bqbxfghye5gbcr.azurecr.io
          registryUsername: ${{ secrets.API4MANAGE_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.API4MANAGE_REGISTRY_PASSWORD }}
          containerAppName: api-4manage
          resourceGroup: rg-4manage
          imageToBuild: acrteste4managerapi-a6bqbxfghye5gbcr.azurecr.io/api-4manage:${{ github.sha }}
          targetPort: 80
